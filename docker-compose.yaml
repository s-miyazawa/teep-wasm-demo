services:
  container_tam:
    build:
      context: ./AttesTAM
      dockerfile: docker/sgx-verifier.Dockerfile
    image: attestam-sgx
    environment:
      ATTESTAM_INSECURE_DEMO_MODE: "true"
      ADMIN_CONSOLE_PORT: "9090"
      ADMIN_CONSOLE_TAM_API_BASE: http://127.0.0.1:8080/
    network_mode: host
    tty: true

  container_attester:
    build:
      context: ./taws
      args:
        TAWS_DCAP_PROVIDER: ${TAWS_DCAP_PROVIDER:-pccs}
    image: taws:${TAWS_DCAP_PROVIDER:-pccs}
    environment:
      TAWS_DCAP_PROVIDER: ${TAWS_DCAP_PROVIDER:-pccs}
      TAWS_TAM_URL: http://localhost:8080/tam
      TAWS_LOG_LEVEL: info
      PCCS_API_KEY: ${PCCS_API_KEY:-}
      PCCS_PROXY: ${PCCS_PROXY:-}
      PCCS_CACHING_MODE: ${PCCS_CACHING_MODE:-}
    devices:
      - /dev/sgx_enclave:/dev/sgx_enclave
      - /dev/sgx_provision:/dev/sgx_provision
    tty: true
    network_mode: host
    depends_on:
      - container_tam
